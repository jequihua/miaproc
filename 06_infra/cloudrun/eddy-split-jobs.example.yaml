# Eddy silver dry-run (recommended first validation mode). Reads BigQuery and
# writes local M32A source-truth payload artifacts only (stage_payload.csv +
# stage_payload_metadata.json). No BigQuery write, validation SQL, MERGE, or
# watermark advancement. The dry-run `columns` should carry source-truth names
# (timestamp, co2_flux, qc_co2_flux, air_temperature_c, u_star, VPD_hpa,
# SWIN_1_1_1, P_RAIN_1_1_1, RH_1_1_1, and flux-side RH when present) and no
# internal-name passthroughs (DateTime, NEE, QC_NEE, Tair, USTAR, VPD, Rg,
# P_RAIN, rH).
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: miaproc-eddy-silver-dry-run-example
  namespace: <PROJECT_ID>
  labels:
    app: miaproc
    domain: eddy
    stage: silver-dry-run
    example: "true"
spec:
  template:
    spec:
      parallelism: 1
      taskCount: 1
      template:
        spec:
          serviceAccountName: <SERVICE_ACCOUNT_EMAIL>
          maxRetries: 0
          timeoutSeconds: 1800
          containers:
          - name: miaproc
            image: <IMAGE_URI>
            command: ["miaproc"]
            args:
            - eddy
            - run-bigquery-silver
            - --bq-input-project=<INPUT_PROJECT>
            - --bq-input-dataset=<INPUT_DATASET>
            - --bq-flux-table=<FLUX_TABLE>
            - --bq-biomet-table=<BIOMET_TABLE>
            - --bq-billing-project=<BILLING_PROJECT>
            - --group-column=site_id
            - --bq-output-project=<OUTPUT_PROJECT>
            - --bq-output-dataset=<OUTPUT_DATASET>
            - --bq-stage-table=<SILVER_STAGE_TABLE>
            - --bq-control-dataset=<CONTROL_DATASET>
            - --stage-payload-dry-run-dir=/tmp/silver_dry_run
            - --output-table=/tmp/silver.parquet
            - --output-run-json=/tmp/silver_run.json
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: <BILLING_PROJECT>
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
---
# Eddy silver writeback. Mutates the silver stage/control tables. Run only
# after the dry-run job above has been accepted. Produces an M32A source-truth
# silver payload (single `timestamp`, no `DateTime`).
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: miaproc-eddy-silver-writeback-example
  namespace: <PROJECT_ID>
  labels:
    app: miaproc
    domain: eddy
    stage: silver-writeback
    example: "true"
spec:
  template:
    spec:
      parallelism: 1
      taskCount: 1
      template:
        spec:
          serviceAccountName: <SERVICE_ACCOUNT_EMAIL>
          maxRetries: 0
          timeoutSeconds: 1800
          containers:
          - name: miaproc
            image: <IMAGE_URI>
            command: ["miaproc"]
            args:
            - eddy
            - run-bigquery-silver
            - --bq-input-project=<INPUT_PROJECT>
            - --bq-input-dataset=<INPUT_DATASET>
            - --bq-flux-table=<FLUX_TABLE>
            - --bq-biomet-table=<BIOMET_TABLE>
            - --bq-billing-project=<BILLING_PROJECT>
            - --group-column=site_id
            - --bq-output-project=<OUTPUT_PROJECT>
            - --bq-output-dataset=<OUTPUT_DATASET>
            - --bq-stage-table=<SILVER_STAGE_TABLE>
            - --bq-control-dataset=<CONTROL_DATASET>
            - --output-table=/tmp/silver.parquet
            - --output-run-json=/tmp/silver_run.json
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: <BILLING_PROJECT>
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
---
# Eddy gold dry-run (recommended first validation mode). Reads an M32A
# source-truth silver table, reconstructs internal DateTime from `timestamp`
# to drive the selected backend, and writes local M32A source-truth payload
# artifacts only. No BigQuery write, validation SQL, MERGE, or watermark
# advancement. The dry-run `columns` should carry source-truth silver columns
# preserved into gold plus gold-only outputs (nee_f, nee_fqc, sw_in_f, ta_f,
# vpd_f, GPP, Reco, dateAndTime) and a single `timestamp` (no internal
# `DateTime`).
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: miaproc-eddy-gold-dry-run-example
  namespace: <PROJECT_ID>
  labels:
    app: miaproc
    domain: eddy
    stage: gold-dry-run
    example: "true"
spec:
  template:
    spec:
      parallelism: 1
      taskCount: 1
      template:
        spec:
          serviceAccountName: <SERVICE_ACCOUNT_EMAIL>
          maxRetries: 0
          timeoutSeconds: 3600
          containers:
          - name: miaproc
            image: <IMAGE_URI>
            command: ["miaproc"]
            args:
            - eddy
            - run-bigquery-gold
            - --engine=reddyproc-reference
            - --bq-input-project=<OUTPUT_PROJECT>
            - --bq-input-dataset=<OUTPUT_DATASET>
            - --bq-silver-table=<SILVER_STAGE_OR_FINAL_TABLE>
            - --bq-billing-project=<BILLING_PROJECT>
            - --group-column=site_id
            - --repo-root=/app
            - --bq-output-project=<OUTPUT_PROJECT>
            - --bq-output-dataset=<OUTPUT_DATASET>
            - --bq-stage-table=<GOLD_STAGE_TABLE>
            - --bq-final-table=<GOLD_FINAL_TABLE>
            - --bq-control-dataset=<CONTROL_DATASET>
            - --bq-allow-final-merge
            - --stage-payload-dry-run-dir=/tmp/gold_dry_run
            - --output-table=/tmp/gold.parquet
            - --output-diagnostics-json=/tmp/gold_diag.json
            - --output-run-json=/tmp/gold_run.json
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: <BILLING_PROJECT>
            resources:
              limits:
                cpu: "2"
                memory: 8Gi
---
