# Eddy silver dry-run. Reads BigQuery and writes local payload artifacts only.
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: miaproc-eddy-silver-dry-run-example
  namespace: <PROJECT_ID>
  labels:
    app: miaproc
    domain: eddy
    stage: silver-dry-run
    example: "true"
spec:
  template:
    spec:
      parallelism: 1
      taskCount: 1
      template:
        spec:
          serviceAccountName: <SERVICE_ACCOUNT_EMAIL>
          maxRetries: 0
          timeoutSeconds: 1800
          containers:
          - name: miaproc
            image: <IMAGE_URI>
            command: ["miaproc"]
            args:
            - eddy
            - run-bigquery-silver
            - --bq-input-project=<INPUT_PROJECT>
            - --bq-input-dataset=<INPUT_DATASET>
            - --bq-flux-table=<FLUX_TABLE>
            - --bq-biomet-table=<BIOMET_TABLE>
            - --bq-billing-project=<BILLING_PROJECT>
            - --group-column=site_id
            - --bq-output-project=<OUTPUT_PROJECT>
            - --bq-output-dataset=<OUTPUT_DATASET>
            - --bq-stage-table=<SILVER_STAGE_TABLE>
            - --bq-control-dataset=<CONTROL_DATASET>
            - --stage-payload-dry-run-dir=/tmp/silver_dry_run
            - --output-table=/tmp/silver.parquet
            - --output-run-json=/tmp/silver_run.json
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: <BILLING_PROJECT>
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
---
