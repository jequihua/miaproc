# Cloud Run Job manifest: miaproc eddy run-bigquery, RBRL, EXPLICIT MERGE
# (M11 manual cloud deployment).
#
# DEPRECATED PRE-M24 SHAPE: this manifest passes ``--site-id=RBRL``
# and a per-site stage table name. Under M24 the CLI no longer
# accepts ``--site-id``; ``--group-column site_id`` partitions the
# read and writeback advances per-site watermarks for every stacked
# site. This manifest is preserved as the cloud-validated
# M11/M12/M13 audit trail under its pinned digest. New deployments
# should use the M24-shaped BigQuery split manifests
# (``miaproc-eddy-rbrl-bigquery-gold-merge.yaml``) which use shared
# stage/final tables and ``--group-column site_id``.
#
# Purpose: stage processed RBRL output into
# manglaria-staging.manglaria_lakehouse_ds.cf_s2_stage_rbrl, validate,
# then MERGE into
# manglaria-staging.manglaria_lakehouse_ds.carbon_flux_eddycovariance_s2_filt_1
# on (site_id, timestamp). Watermark advances only on a successful
# merge. **Mutates the staging final table.** Operator must opt in
# explicitly per execution; deploy + execute are kept as separate
# steps so accidentally re-executing the staging job does not
# re-MERGE without the operator looking at the args first.
#
# To deploy / update:
#   gcloud run jobs replace 06_infra/cloudrun/miaproc-eddy-rbrl-merge.yaml \
#     --region=us-central1 --project=manglaria-staging
#
# To execute (one-shot, blocking on completion):
#   gcloud run jobs execute miaproc-eddy-rbrl-merge \
#     --region=us-central1 --project=manglaria-staging --wait
#
# Each execution overrides the --bq-run-id so cf_s2_runs rows stay
# distinguishable. Override at execution time with:
#   gcloud run jobs execute miaproc-eddy-rbrl-merge \
#     --region=us-central1 --project=manglaria-staging --wait \
#     --update-env-vars=MIAPROC_RUN_ID=cloudrun-merge-<UTC-timestamp>
# (the manifest currently bakes the run-id into args; update the
# manifest before each MERGE, or add a small entrypoint shim that
# reads MIAPROC_RUN_ID, in a follow-up pass.)
#
# Service account is the dedicated cf-s2-eddy-runner@... identity in
# manglaria-staging (M12). Execution is currently blocked pending
# Project-IAM-Admin handoff; see
# 06_infra/cloudrun/iam-grants-required.md.
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: miaproc-eddy-rbrl-merge
  namespace: manglaria-staging
  labels:
    app: miaproc
    domain: eddy
    site: rbrl
    stage: writeback-merge
spec:
  template:
    spec:
      parallelism: 1
      taskCount: 1
      template:
        spec:
          serviceAccountName: cf-s2-eddy-runner@manglaria-staging.iam.gserviceaccount.com
          maxRetries: 0
          timeoutSeconds: 1800
          containers:
          - name: miaproc
            image: us-central1-docker.pkg.dev/manglaria-staging/cloud-run-source-deploy/miaproc@sha256:0db1b2d96fa4640ab5625ac470afbaaa52df689876f04c6bb321be288b0b3408
            command:
            - miaproc
            args:
            - eddy
            - run-bigquery
            - --engine=reddyproc-reference
            - --bq-input-project=manglaria
            - --bq-input-dataset=manglaria_lakehouse_ds
            - --bq-flux-table=carbon_flux_eddycovariance
            - --bq-biomet-table=carbon_flux_biomet
            - --bq-billing-project=manglaria-staging
            - --site-id=RBRL
            - --repo-root=/app
            - --bq-output-project=manglaria-staging
            - --bq-output-dataset=manglaria_lakehouse_ds
            - --bq-stage-table=cf_s2_stage_rbrl
            - --bq-final-table=carbon_flux_eddycovariance_s2_filt_1
            - --bq-control-dataset=_orch
            - --bq-allow-final-merge
            - --output-table=/tmp/processed.parquet
            - --output-diagnostics-json=/tmp/diagnostics.json
            - --output-run-json=/tmp/run.json
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: manglaria-staging
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
