# Cloud Run Job manifest: miaproc eddy run-bigquery-gold, all sites,
# EXPLICIT MERGE (M24 all-data grouped gold-merge job — DRAFT example).
#
# Purpose: read the shared all-site silver-stage eddy table written by
# the M24 silver job at
# `manglaria-staging.manglaria_lakehouse_ds.cf_s2_silver_stage`, run
# the bundled `reddyproc-reference` engine through the project-scoped
# R preflight (Decision 010 / R11) for every site present, stage
# stacked all-site gold output into
# `manglaria-staging.manglaria_lakehouse_ds.cf_s2_gold_stage`,
# validate, then MERGE into
# `manglaria-staging.manglaria_lakehouse_ds.cf_s2_gold` keyed on
# (site_id, timestamp). **Mutates the staging final gold table.**
# The M24 watermark advances per-site (one watermark row per stacked
# site) only on a successful merge; the package-level
# `forbidden_write_projects=("manglaria",)` invariant keeps
# production read-only.
#
# M24: --site-id is no longer a CLI flag and the silver BigQuery
# read does not inject a WHERE site_id filter. `--group-column site_id`
# partitions the silver read into per-category gold runs in Python,
# stacks the per-category gold outputs once into the shared gold
# stage table, and the final MERGE then writes every stacked
# (site_id, timestamp) row in one operation. Per-site watermarks
# advance for every stacked site after the merge succeeds.
#
# Operator must opt in explicitly per execution. Deploy + execute as
# a separate job from the stage-only manifest at
# `miaproc-eddy-rbrl-bigquery-gold-stage.yaml` so accidentally
# re-executing the routine stage-only job cannot MERGE without the
# operator looking at the args first.
#
# To deploy / update:
#   gcloud run jobs replace 06_infra/cloudrun/miaproc-eddy-rbrl-bigquery-gold-merge.yaml \
#     --region=us-central1 --project=manglaria-staging
#
# To execute (one-shot, blocking on completion):
#   gcloud run jobs execute miaproc-eddy-bigquery-gold-merge \
#     --region=us-central1 --project=manglaria-staging --wait
#
# Status: DRAFT example. Image is pinned to the M23 immutable digest.
# Operator-owned items the cloud engineer must replace before live
# deployment:
#
# - `serviceAccountName` (cf-s2-eddy-runner reused here as a draft;
#   live IAM bindings under 06_infra/cloudrun/iam-grants-required.md;
#   the merge identity needs `bigquery.dataEditor` on the staging
#   dataset, not just `bigquery.dataViewer`);
# - `--bq-silver-table=cf_s2_silver_stage`,
#   `--bq-stage-table=cf_s2_gold_stage`, and
#   `--bq-final-table=cf_s2_gold` (shared all-site identifiers under
#   M24; per-site suffixes are no longer required);
# - region / namespace / resource limits if they differ;
# - --bq-start-timestamp / --bq-end-timestamp window if bounded;
# - the per-execution `--bq-run-id` if you want stable distinct
#   audit-trail entries in cf_s2_runs (omitted here so the package
#   default `local-<UTC>-<pid>` namespacing kicks in).
#
# This manifest has NOT been validated against a live BigQuery
# environment under M24; it is a sketch intended to ride alongside
# the accepted one-shot manifests. No final-table mutation has been
# observed for the M24 grouped path yet.
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: miaproc-eddy-bigquery-gold-merge
  namespace: manglaria-staging
  labels:
    app: miaproc
    domain: eddy
    stage: bigquery-gold-merge
spec:
  template:
    spec:
      parallelism: 1
      taskCount: 1
      template:
        spec:
          serviceAccountName: cf-s2-eddy-runner@manglaria-staging.iam.gserviceaccount.com
          maxRetries: 0
          timeoutSeconds: 1800
          containers:
          - name: miaproc
            image: us-central1-docker.pkg.dev/manglaria-staging/cloud-run-source-deploy/miaproc@sha256:a59f763246bcc08ccb2b82f40309f98850de53f898533c8c5ac0c69a53acd36f
            command:
            - miaproc
            args:
            - eddy
            - run-bigquery-gold
            - --engine=reddyproc-reference
            - --bq-input-project=manglaria-staging
            - --bq-input-dataset=manglaria_lakehouse_ds
            - --bq-silver-table=cf_s2_silver_stage
            - --bq-billing-project=manglaria-staging
            - --group-column=site_id
            - --repo-root=/app
            - --bq-output-project=manglaria-staging
            - --bq-output-dataset=manglaria_lakehouse_ds
            - --bq-stage-table=cf_s2_gold_stage
            - --bq-final-table=cf_s2_gold
            - --bq-control-dataset=_orch
            - --bq-allow-final-merge
            - --output-table=/tmp/gold.parquet
            - --output-diagnostics-json=/tmp/gold_diag.json
            - --output-run-json=/tmp/gold_run.json
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: manglaria-staging
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
