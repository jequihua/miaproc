# Eddy gold dry-run. Reads silver, runs the selected engine, and writes local payload artifacts only.
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: miaproc-eddy-gold-dry-run-example
  namespace: <PROJECT_ID>
  labels:
    app: miaproc
    domain: eddy
    stage: gold-dry-run
    example: "true"
spec:
  template:
    spec:
      parallelism: 1
      taskCount: 1
      template:
        spec:
          serviceAccountName: <SERVICE_ACCOUNT_EMAIL>
          maxRetries: 0
          timeoutSeconds: 3600
          containers:
          - name: miaproc
            image: <IMAGE_URI>
            command: ["miaproc"]
            args:
            - eddy
            - run-bigquery-gold
            - --engine=reddyproc-reference
            - --bq-input-project=<OUTPUT_PROJECT>
            - --bq-input-dataset=<OUTPUT_DATASET>
            - --bq-silver-table=<SILVER_STAGE_OR_FINAL_TABLE>
            - --bq-billing-project=<BILLING_PROJECT>
            - --group-column=site_id
            - --repo-root=/app
            - --bq-output-project=<OUTPUT_PROJECT>
            - --bq-output-dataset=<OUTPUT_DATASET>
            - --bq-stage-table=<GOLD_STAGE_TABLE>
            - --bq-final-table=<GOLD_FINAL_TABLE>
            - --bq-control-dataset=<CONTROL_DATASET>
            - --bq-allow-final-merge
            - --stage-payload-dry-run-dir=/tmp/gold_dry_run
            - --output-table=/tmp/gold.parquet
            - --output-diagnostics-json=/tmp/gold_diag.json
            - --output-run-json=/tmp/gold_run.json
            env:
            - name: GOOGLE_CLOUD_PROJECT
              value: <BILLING_PROJECT>
            resources:
              limits:
                cpu: "2"
                memory: 8Gi
---
